<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="mcq-maker — turn any document into a non-gameable MCQ quiz">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="0.55" stop-color="#111a32"/>
      <stop offset="1" stop-color="#1b1140"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="20" fill="url(#dots)"/>
  <rect x="0" y="0" width="8" height="360" fill="url(#accent)" opacity="0.9"/>

  <!-- Left: wordmark + tagline -->
  <g transform="translate(72,96)">
    <text x="0" y="0" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="74" font-weight="700" fill="#f8fafc" letter-spacing="-1">
      mcq<tspan fill="url(#accent)">-</tspan>maker
    </text>
    <text x="2" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="25" font-weight="500" fill="#cbd5e1">
      Turn any document into a quiz that tests understanding<tspan x="2" dy="34">— not cramming. And can't be gamed.</tspan>
    </text>

    <!-- feature pills -->
    <g font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600">
      <g transform="translate(0,128)">
        <rect width="148" height="34" rx="17" fill="#312e81" fill-opacity="0.55" stroke="#6366f1" stroke-opacity="0.5"/>
        <text x="74" y="22" text-anchor="middle" fill="#c7d2fe">Theory</text>
      </g>
      <g transform="translate(160,128)">
        <rect width="200" height="34" rx="17" fill="#312e81" fill-opacity="0.55" stroke="#6366f1" stroke-opacity="0.5"/>
        <text x="100" y="22" text-anchor="middle" fill="#c7d2fe">Problem Solving</text>
      </g>
      <g transform="translate(372,128)">
        <rect width="200" height="34" rx="17" fill="#312e81" fill-opacity="0.55" stroke="#6366f1" stroke-opacity="0.5"/>
        <text x="100" y="22" text-anchor="middle" fill="#c7d2fe">Conceptual · L1–L3</text>
      </g>
    </g>

    <text x="2" y="196" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="500" fill="#94a3b8">
      Interactive quiz website  +  Word (.docx) export  ·  a reusable Claude Skill
    </text>
  </g>

  <!-- Right: mock quiz card -->
  <g transform="translate(872,66)" filter="url(#soft)">
    <rect width="336" height="228" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="24" y="42" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Q. Which describes O(n) best?</text>

    <!-- options A-D, none visually marked as correct -->
    <g font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#cbd5e1">
      <g transform="translate(24,64)">
        <rect width="288" height="34" rx="9" fill="#0b1120" stroke="#475569"/>
        <circle cx="20" cy="17" r="11" fill="none" stroke="#64748b"/>
        <text x="20" y="22" text-anchor="middle" font-weight="700" fill="#94a3b8">A</text>
        <text x="42" y="22">Runtime grows with input size</text>
      </g>
      <g transform="translate(24,104)">
        <rect width="288" height="34" rx="9" fill="#0b1120" stroke="#475569"/>
        <circle cx="20" cy="17" r="11" fill="none" stroke="#64748b"/>
        <text x="20" y="22" text-anchor="middle" font-weight="700" fill="#94a3b8">B</text>
        <text x="42" y="22">Always exactly n operations</text>
      </g>
      <g transform="translate(24,144)">
        <rect width="288" height="34" rx="9" fill="#0b1120" stroke="#475569"/>
        <circle cx="20" cy="17" r="11" fill="none" stroke="#64748b"/>
        <text x="20" y="22" text-anchor="middle" font-weight="700" fill="#94a3b8">C</text>
        <text x="42" y="22">Constant, independent of input</text>
      </g>
      <g transform="translate(24,184)">
        <rect width="288" height="34" rx="9" fill="#0b1120" stroke="#475569"/>
        <circle cx="20" cy="17" r="11" fill="none" stroke="#64748b"/>
        <text x="20" y="22" text-anchor="middle" font-weight="700" fill="#94a3b8">D</text>
        <text x="42" y="22">The fastest possible algorithm</text>
      </g>
    </g>
  </g>

  <!-- balanced A/B/C/D motif bottom-right -->
  <g transform="translate(872,312)" font-family="'JetBrains Mono',Consolas,monospace" font-size="13" fill="#64748b">
    <text x="0" y="0">positions balanced · no streaks · answer hidden until graded</text>
  </g>
</svg>
